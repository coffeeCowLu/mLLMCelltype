  citation:
    title: Citation
    text: |
      If you use mLLMCelltype in your research, please cite our paper:
      
      <p>Yang, C., Zhang, X., & Chen, J. (2025).
      <em>Large Language Model Consensus Substantially Improves the Cell Type Annotation Accuracy for scRNA-seq Data</em>.
      bioRxiv. <a href="https://doi.org/10.1101/2025.04.10.647852">doi:10.1101/2025.04.10.647852</a>.</p>
      
      ```bibtex
      @article{Yang2025.04.10.647852,
        author = {Chen Yang and Xianyang Zhang and Jun Chen},
        title = {Large Language Model Consensus Substantially Improves the Cell Type Annotation Accuracy for scRNA-seq Data},
        elocation-id = {2025.04.10.647852},
        year = {2025},
        doi = {10.1101/2025.04.10.647852},
        publisher = {Cold Spring Harbor Laboratory},
        URL = {https://www.biorxiv.org/content/early/2025/04/17/2025.04.10.647852},
        journal = {bioRxiv}
      }
      ```
  title: "mLLMCelltype: Cell Type Annotation Using Multi-LLM Consensus"
  description: |
    <div class="row">
      <div class="col-md-3">
        <img src="man/figures/logo.png" alt="mLLMCelltype logo" class="img-fluid" style="max-width: 100%; margin-bottom: 15px;">
      </div>
      <div class="col-md-9">
        <p>mLLMCelltype is an R package for automated cell type annotation in single-cell RNA sequencing data using multi-LLM consensus.</p>
        <p>The package combines predictions from multiple large language models to produce annotations that are less sensitive to individual model biases.</p>
        <p>Key features:</p>
        <ul>
          <li>Multi-LLM consensus annotation</li>
          <li>Discussion process for ambiguous clusters</li>
          <li>Uncertainty quantification (consensus proportion and Shannon entropy)</li>
          <li>No reference dataset required</li>
          <li>Support for multiple LLM providers (OpenAI, Anthropic, Google, DeepSeek, and others)</li>
          <li>Integration with Seurat</li>
        </ul>
        <p>For details, see our paper: <a href="https://doi.org/10.1101/2025.04.10.647852" class="external-link">doi:10.1101/2025.04.10.647852</a></p>
      </div>
    </div>
