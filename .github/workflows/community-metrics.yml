name: Community Metrics & SEO Updates

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:  # Manual trigger

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    name: Update Community Metrics
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Get current star count
      id: stars
      run: |
        STARS=$(curl -s https://api.github.com/repos/cafferychen777/mLLMCelltype | jq '.stargazers_count')
        echo "stars=$STARS" >> $GITHUB_OUTPUT
        echo "Current stars: $STARS"
        
    - name: Get contributor count
      id: contributors
      run: |
        CONTRIBUTORS=$(curl -s https://api.github.com/repos/cafferychen777/mLLMCelltype/contributors | jq length)
        echo "contributors=$CONTRIBUTORS" >> $GITHUB_OUTPUT
        echo "Current contributors: $CONTRIBUTORS"
        
    - name: Update README with current metrics
      run: |
        sed -i "s/540+ ⭐/${{ steps.stars.outputs.stars }}+ ⭐/g" README.md
        sed -i "s/540+ GitHub stars/${{ steps.stars.outputs.stars }}+ GitHub stars/g" README.md
        
    - name: Check for changes
      id: changes
      run: |
        if [[ -n $(git status --porcelain) ]]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Commit and push if changed
      if: steps.changes.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add README.md
        git commit -m "chore: Update community metrics to ${{ steps.stars.outputs.stars }} stars

        🤖 Automated update via GitHub Actions
        
        - Updated star count from 540+ to ${{ steps.stars.outputs.stars }}+
        - Maintaining competitive positioning in README
        
        Co-Authored-By: GitHub Actions <action@github.com>"
        git push