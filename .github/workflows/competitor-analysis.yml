name: Weekly Competitor Analysis

on:
  schedule:
    - cron: '0 8 * * 2'  # Tuesday 8 AM UTC
  workflow_dispatch:

jobs:
  analyze-competitors:
    runs-on: ubuntu-latest
    name: Track Competitive Landscape
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq curl
        
    - name: Collect competitor metrics
      id: competitors
      run: |
        # Function to safely get repo metrics
        get_repo_metrics() {
          local repo=$1
          local metrics=$(curl -s "https://api.github.com/repos/$repo" || echo '{}')
          echo "$metrics"
        }
        
        # mLLMCelltype (us)
        OUR_METRICS=$(get_repo_metrics "cafferychen777/mLLMCelltype")
        OUR_STARS=$(echo "$OUR_METRICS" | jq '.stargazers_count // 0')
        OUR_FORKS=$(echo "$OUR_METRICS" | jq '.forks_count // 0')
        OUR_ISSUES=$(echo "$OUR_METRICS" | jq '.open_issues_count // 0')
        OUR_UPDATED=$(echo "$OUR_METRICS" | jq -r '.updated_at // "unknown"')
        
        # CASSIA (main competitor)
        CASSIA_METRICS=$(get_repo_metrics "ElliotXie/CASSIA")
        CASSIA_STARS=$(echo "$CASSIA_METRICS" | jq '.stargazers_count // 0')
        CASSIA_FORKS=$(echo "$CASSIA_METRICS" | jq '.forks_count // 0')
        CASSIA_ISSUES=$(echo "$CASSIA_METRICS" | jq '.open_issues_count // 0')
        CASSIA_UPDATED=$(echo "$CASSIA_METRICS" | jq -r '.updated_at // "unknown"')
        
        # Other competitors
        SINGLER_METRICS=$(get_repo_metrics "LTLA/SingleR")
        SINGLER_STARS=$(echo "$SINGLER_METRICS" | jq '.stargazers_count // 0')
        
        CELLTYP_METRICS=$(get_repo_metrics "Winnie09/CellTypist")  
        CELLTYP_STARS=$(echo "$CELLTYP_METRICS" | jq '.stargazers_count // 0')
        
        # Store results
        echo "our_stars=$OUR_STARS" >> $GITHUB_OUTPUT
        echo "our_forks=$OUR_FORKS" >> $GITHUB_OUTPUT
        echo "our_issues=$OUR_ISSUES" >> $GITHUB_OUTPUT
        echo "cassia_stars=$CASSIA_STARS" >> $GITHUB_OUTPUT
        echo "cassia_forks=$CASSIA_FORKS" >> $GITHUB_OUTPUT
        echo "cassia_issues=$CASSIA_ISSUES" >> $GITHUB_OUTPUT
        echo "singler_stars=$SINGLER_STARS" >> $GITHUB_OUTPUT
        echo "celltyp_stars=$CELLTYP_STARS" >> $GITHUB_OUTPUT
        
        # Calculate trends
        ADVANTAGE=$((OUR_STARS - CASSIA_STARS))
        echo "advantage=$ADVANTAGE" >> $GITHUB_OUTPUT
        
    - name: Check for new competitors
      id: new-competitors
      run: |
        # Search for new repositories with relevant keywords
        NEW_REPOS=$(curl -s "https://api.github.com/search/repositories?q=LLM+cell+annotation+created:>$(date -d '7 days ago' +%Y-%m-%d)&sort=stars&order=desc" | jq -r '.items[]|select(.stargazers_count > 5)|.full_name' | head -5)
        
        echo "new_repos<<EOF" >> $GITHUB_OUTPUT
        echo "$NEW_REPOS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
    - name: Analyze bioRxiv publications
      id: publications
      run: |
        # Check for new preprints mentioning cell annotation and LLM
        echo "Checking for new competing publications..."
        # Note: This would require bioRxiv API access in a real implementation
        echo "manual_check_needed=true" >> $GITHUB_OUTPUT
        
    - name: Generate competitive intelligence report
      run: |
        cat > competitive-analysis.md << EOF
        # Competitive Analysis Report - $(date +%Y-%m-%d)
        
        ## 📊 Market Position Summary
        
        ### 🏆 mLLMCelltype (Our Position)
        - **Stars**: ${{ steps.competitors.outputs.our_stars }} ⭐
        - **Forks**: ${{ steps.competitors.outputs.our_forks }} 🍴
        - **Open Issues**: ${{ steps.competitors.outputs.our_issues }} 📋
        - **Competitive Advantage**: +${{ steps.competitors.outputs.advantage }} stars vs CASSIA
        
        ### 🎯 Direct Competitors
        
        #### CASSIA (Primary Competitor)
        - **Stars**: ${{ steps.competitors.outputs.cassia_stars }} ⭐
        - **Forks**: ${{ steps.competitors.outputs.cassia_forks }} 🍴  
        - **Gap**: We lead by ${{ steps.competitors.outputs.advantage }} stars
        - **Strategy**: Multi-agent approach vs our consensus methodology
        
        #### Traditional Tools
        - **SingleR**: ${{ steps.competitors.outputs.singler_stars }} stars (reference-based)
        - **CellTypist**: ${{ steps.competitors.outputs.celltyp_stars }} stars (ML classifier)
        
        ## 🔍 New Market Entrants
        
        \`\`\`
        ${{ steps.new-competitors.outputs.new_repos }}
        \`\`\`
        
        ## 📈 Trend Analysis
        
        ### Growth Trajectory
        - **Market Leadership**: ✅ Maintained #1 position in LLM cell annotation
        - **Community Growth**: Steady increase in stars and forks
        - **Developer Activity**: Regular commits and feature releases
        
        ### Competitive Threats
        - Monitor CASSIA for feature announcements
        - Watch for new AI-based annotation tools
        - Track traditional tool AI integrations
        
        ## 🎯 Strategic Recommendations
        
        ### Immediate Actions (This Week)
        - [ ] Review competitor feature announcements
        - [ ] Update performance benchmarks if needed
        - [ ] Engage community with new content
        
        ### Short-term Strategy (This Month)  
        - [ ] Release new features to maintain technical lead
        - [ ] Increase marketing and outreach efforts
        - [ ] Strengthen academic partnerships
        
        ### Long-term Positioning (Next Quarter)
        - [ ] Expand into adjacent market segments
        - [ ] Build ecosystem partnerships
        - [ ] Establish thought leadership content
        
        ## 📊 Key Metrics to Watch
        - **Star Growth Rate**: Target 50+ new stars per month
        - **Community Engagement**: Issues, discussions, contributions
        - **Academic Adoption**: Citations and research partnerships
        - **Technical Innovation**: Feature releases and performance improvements
        
        ---
        *Generated automatically by competitive analysis workflow*
        EOF
        
    - name: Create strategy issue if significant changes
      if: steps.competitors.outputs.advantage < 450
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🚨 Competitive Alert: Market Position Needs Attention',
            body: `## Competitive Analysis Alert
            
            Our market position requires strategic attention based on this week's analysis.
            
            **Current Metrics:**
            - mLLMCelltype: ${{ steps.competitors.outputs.our_stars }} stars
            - CASSIA: ${{ steps.competitors.outputs.cassia_stars }} stars  
            - Advantage: ${{ steps.competitors.outputs.advantage }} stars (below 450 threshold)
            
            **Recommended Actions:**
            1. 🚀 **Accelerate Feature Development**: Release compelling new features
            2. 📢 **Increase Marketing**: Boost community outreach and content marketing
            3. 🤝 **Partnership Focus**: Secure high-profile academic collaborations
            4. 📊 **Performance Claims**: Update benchmarks and competitive comparisons
            5. 🎯 **User Acquisition**: Launch targeted campaigns to research communities
            
            **New Competitors to Monitor:**
            ${{ steps.new-competitors.outputs.new_repos }}
            
            This issue was automatically created by competitive analysis monitoring.`,
            labels: ['strategy', 'competitive-analysis', 'urgent']
          })
          
    - name: Archive analysis report
      run: |
        mkdir -p .github/competitive-analysis
        cp competitive-analysis.md ".github/competitive-analysis/$(date +%Y-%m-%d)-report.md"
        
        # Keep only last 12 reports (3 months)
        cd .github/competitive-analysis
        ls -t *.md | tail -n +13 | xargs -r rm
        
    - name: Commit analysis updates
      run: |
        git config --local user.email "competitive-analysis@github.com"
        git config --local user.name "Competitive Analysis Bot"
        git add .github/competitive-analysis/
        
        if [[ -n $(git status --porcelain) ]]; then
          git commit -m "chore: Add weekly competitive analysis report

          📊 Market Position Summary:
          - mLLMCelltype: ${{ steps.competitors.outputs.our_stars }} stars (+${{ steps.competitors.outputs.advantage }} vs CASSIA)
          - Monitoring ${{ steps.new-competitors.outputs.new_repos && '3' || '0' }} new potential competitors
          - Maintaining market leadership in consensus-based annotation
          
          🤖 Automated competitive intelligence update
          
          Co-Authored-By: Analysis Bot <competitive-analysis@github.com>"
          git push
        fi