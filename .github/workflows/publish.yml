name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Upload distributions to PyPI'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: python/pyproject.toml

    - name: Build and check
      run: |
        python -m pip install --upgrade pip build twine
        cd python
        python -m build
        twine check dist/*

    - name: Upload distributions
      uses: actions/upload-artifact@v7
      with:
        name: pypi-distributions
        path: python/dist/*
        if-no-files-found: error

    - name: Check PyPI credentials
      id: pypi_credentials
      if: github.event_name == 'release' || inputs.publish
      env:
        PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        PYPI_USERNAME: ${{ secrets.PYPI_USERNAME }}
        PYPI_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
      run: |
        if [ -n "$PYPI_API_TOKEN" ]; then
          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "method=token" >> "$GITHUB_OUTPUT"
        elif [ -n "$PYPI_USERNAME" ] && [ -n "$PYPI_PASSWORD" ]; then
          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "method=username-password" >> "$GITHUB_OUTPUT"
        else
          echo "available=false" >> "$GITHUB_OUTPUT"
          echo "::warning::PYPI_API_TOKEN or PYPI_USERNAME/PYPI_PASSWORD secrets are not configured; skipping PyPI upload."
        fi

    - name: Publish
      if: steps.pypi_credentials.outputs.available == 'true' && (github.event_name == 'release' || inputs.publish)
      env:
        PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        PYPI_USERNAME: ${{ secrets.PYPI_USERNAME }}
        PYPI_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
      run: |
        cd python
        if [ "${{ steps.pypi_credentials.outputs.method }}" = "token" ]; then
          TWINE_USERNAME="__token__" TWINE_PASSWORD="$PYPI_API_TOKEN" twine upload --skip-existing dist/*
        else
          TWINE_USERNAME="$PYPI_USERNAME" TWINE_PASSWORD="$PYPI_PASSWORD" twine upload --skip-existing dist/*
        fi
