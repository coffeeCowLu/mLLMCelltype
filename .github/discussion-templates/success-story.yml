title: "🌟 Success Story: [Brief Description]"
labels: ["success-story", "community", "showcase"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🎉 Share Your mLLMCelltype Success Story!
        
        Help inspire the community by sharing how mLLMCelltype's consensus methodology helped advance your research or solved challenging annotation problems.
        
  - type: input
    id: research_context
    attributes:
      label: "Research Context"
      description: "What research question were you trying to answer?"
      placeholder: "e.g., Identifying novel cell populations in disease tissue, etc."
    validations:
      required: true
      
  - type: textarea
    id: challenge
    attributes:
      label: "The Challenge"
      description: "What annotation challenges were you facing?"
      placeholder: "e.g., Ambiguous cell types, conflicting literature, rare populations, etc."
    validations:
      required: true
      
  - type: textarea
    id: solution
    attributes:
      label: "How mLLMCelltype Helped"
      description: "How did mLLMCelltype's consensus approach solve your problem?"
      placeholder: "e.g., Multiple models agreed on controversial populations, uncertainty metrics guided expert review, etc."
    validations:
      required: true
      
  - type: textarea
    id: results
    attributes:
      label: "Results & Impact"
      description: "What was the outcome of using mLLMCelltype?"
      placeholder: "e.g., Discovered new cell subtype, improved annotation accuracy, published paper, etc."
      
  - type: input
    id: models_used
    attributes:
      label: "LLM Models in Consensus"
      description: "Which models did you use?"
      placeholder: "e.g., GPT-4o + Claude-3.5-Sonnet + Gemini-1.5-Pro"
      
  - type: checkboxes
    id: features_used
    attributes:
      label: "Key Features That Helped"
      options:
        - label: "Multi-model consensus voting"
        - label: "Uncertainty quantification (Shannon entropy)"
        - label: "Controversial cluster identification"
        - label: "Iterative discussion for difficult cases"
        - label: "Cost optimization through smart consensus"
        - label: "No reference dataset requirement"
        
  - type: checkboxes
    id: comparison
    attributes:
      label: "Comparison with Other Tools"
      options:
        - label: "Tried traditional methods first (less accurate)"
        - label: "Compared with single-LLM approaches (consensus was better)"
        - label: "Used alongside manual annotation (mLLMCelltype was faster)"
        - label: "Switched from other AI tools (mLLMCelltype more reliable)"
        
  - type: textarea
    id: publication
    attributes:
      label: "Publication Information (Optional)"
      description: "If this led to a publication, please share details"
      placeholder: "Journal name, DOI, or 'manuscript in preparation'"
      
  - type: checkboxes
    id: testimonial_permission
    attributes:
      label: "Sharing Permission"
      options:
        - label: "This story can be featured on mLLMCelltype website"
        - label: "I'm willing to be quoted in promotional materials"
        - label: "I'd participate in a user interview or case study"
        - label: "This can be shared on social media with attribution"