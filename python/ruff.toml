# ruff.toml

# 排除一些目录和文件
exclude = [
    ".git",
    ".ruff_cache",
    "__pycache__",
    "build",
    "dist",
    "venv",
    "env",
    ".env",
    ".venv",
    "docs",
    "temp_test_files",
    "test_cache_simple.py",
    "test_cache_comprehensive.py",
    "test_real_scenario.py",
    "github_issue_response.md",
]

# 行长度设置
line-length = 100

# 目标 Python 版本
target-version = "py39"

[lint]
# Enable flake8-bugbear (`B`) rules.
select = ["E", "F", "B", "I"]

# 忽略一些特定的规则
ignore = [
    "E501",  # 行太长
    "E203",  # 冒号周围的空格
]


[lint.isort]
known-first-party = ["mllmcelltype"]